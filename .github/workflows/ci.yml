name: Build and push docker image

on: 
    push:
        branches:
            - main
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3
            - name: Login to docker hub
              uses: docker/login-action@v2
              with:
                username: ${{ secrets.DOCKER_USERNAME }}
                password: ${{ secrets.DOCKER_PASSWORD }}
            - name: Build Docker image
              run: docker build -t andriamaharavo/docker_with_cloud:latest .
            - name: Push Docker image
              run: docker push andriamaharavo/docker_with_cloud:latest
    deploy:
      runs-on: self-hosted
      needs: build
      steps:
        - name: pull image
          run: docker pull andriamaharavo/docker_with_cloud:latest
        - name: stop old container
          run: docker rm docker_with_cloud || true
        - name: run new container
          run: docker run -d -p 8080:80 --name docker_with_cloud andriamaharavo/docker_with_cloud
